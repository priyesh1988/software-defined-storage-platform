apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdsp-control-plane
spec:
  replicas: 2
  selector:
    matchLabels: { app: sdsp-control-plane }
  template:
    metadata:
      labels: { app: sdsp-control-plane }
    spec:
      containers:
        - name: api
          image: sdsp/control-plane:latest
          ports: [{ containerPort: 8000 }]
